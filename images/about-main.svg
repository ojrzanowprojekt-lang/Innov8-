<svg xmlns="http://www.w3.org/2000/svg" width="600" height="800" viewBox="0 0 600 800">
  <rect width="600" height="800" fill="#1A1714"/>
  <rect x="1" y="1" width="598" height="798" fill="none" stroke="#9E7A3A" stroke-width="1" opacity="0.3"/>
  <rect x="40" y="40" width="520" height="720" fill="none" stroke="#9E7A3A" stroke-width="1" opacity="0.15"/>
  <!-- Building silhouette -->
  <g opacity="0.12" fill="#9E7A3A">
    <rect x="160" y="280" width="280" height="320"/>
    <rect x="200" y="240" width="80" height="40"/>
    <rect x="320" y="240" width="80" height="40"/>
    <rect x="140" y="200" width="320" height="80"/>
    <!-- windows -->
    <rect x="180" y="320" width="50" height="60" fill="#1A1714" opacity="2"/>
    <rect x="270" y="320" width="50" height="60" fill="#1A1714" opacity="2"/>
    <rect x="360" y="320" width="50" height="60" fill="#1A1714" opacity="2"/>
    <rect x="180" y="420" width="50" height="60" fill="#1A1714" opacity="2"/>
    <rect x="270" y="420" width="50" height="60" fill="#1A1714" opacity="2"/>
    <rect x="360" y="420" width="50" height="60" fill="#1A1714" opacity="2"/>
  </g>
  <!-- Decorative lines -->
  <line x1="220" y1="660" x2="380" y2="660" stroke="#9E7A3A" stroke-width="1" opacity="0.4"/>
  <line x1="260" y1="670" x2="340" y2="670" stroke="#9E7A3A" stroke-width="1" opacity="0.2"/>
  <!-- Text -->
  <text x="300" y="720" font-family="Georgia, serif" font-size="11" fill="#9E7A3A" opacity="0.5" text-anchor="middle" letter-spacing="4">INNOV8 DEVELOPMENT</text>
  <text x="300" y="745" font-family="Georgia, serif" font-size="9" fill="#9E7A3A" opacity="0.3" text-anchor="middle" letter-spacing="3">WARSZAWA</text>
</svg>